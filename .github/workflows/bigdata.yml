name: Ejecucion Automatizada de Big Data (EA1 + EA2)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      # 1. Descarga el código
      - name: Checkout del codigo
        uses: actions/checkout@v3

      # 2. Configura Python
      - name: Configurar Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3. Instala dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      # 4. EJECUTA EA1: Ingesta de datos
      - name: Ejecutar Ingesta (EA1)
        run: python src/ingestion.py

      # 5. EJECUTA EA2: Limpieza de datos
      - name: Ejecutar Limpieza (EA2)
        run: python src/cleaning.py

      # 6. Sube todos los resultados (DB, Excel de Ingesta, Excel Limpio y Reportes)
      - name: Commit y Push de resultados
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # El punto '.' agrega todos los archivos nuevos generados en src/
          git add .
          git commit -m "EA2: Datos limpios y reportes actualizados automáticamente" || echo "Sin cambios"
          git push